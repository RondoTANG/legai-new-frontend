<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>确认订单 - 乐改</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        .header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            background: var(--color-bg);
            border-bottom: 1px solid var(--color-divider);
            position: sticky; top: 0; z-index: 10;
        }
        .header h1 { margin: 0; font-size: 18px; text-align: center; flex: 1; }
        .back-btn { font-size: 24px; text-decoration: none; color: #111; width: 24px; cursor: pointer; }

        .section {
            background: #fff;
            margin-bottom: 12px;
            padding: 16px 20px;
        }
        
        /* Store Selector */
        .store-selector { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .store-info h3 { font-size: 16px; margin-bottom: 4px; display: flex; align-items: center; }
        .store-info p { font-size: 12px; color: var(--color-text-secondary); }
        .store-tag { background: #111; color: #fff; font-size: 10px; padding: 2px 4px; border-radius: 2px; margin-left: 8px; font-weight: normal; }

        /* Order Items */
        .order-item { display: flex; margin-top: 16px; }
        .item-img { width: 70px; height: 70px; background: #eee; border-radius: 4px; margin-right: 12px; object-fit: cover; }
        .item-info { flex: 1; }
        .item-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
        .item-sku { font-size: 12px; color: var(--color-text-tertiary); margin-bottom: 8px; }
        .item-price-row { display: flex; justify-content: space-between; align-items: center; }
        .item-price { font-size: 14px; font-weight: bold; }
        .item-qty { font-size: 12px; color: var(--color-text-secondary); }

        /* Summary */
        .summary-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; }
        .summary-row.total { border-top: 1px solid var(--color-divider); margin-top: 8px; padding-top: 16px; font-weight: bold; font-size: 16px; }

        /* Bottom Bar */
        .submit-bar {
            position: fixed;
            bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 480px;
            background: var(--color-bg);
            padding: 12px 20px calc(12px + env(safe-area-inset-bottom));
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid var(--color-divider);
            z-index: 20;
        }
        .submit-total { font-size: 20px; font-weight: bold; color: #c92a2a; }
        .submit-btn { background: var(--color-black-btn); color: #fff; padding: 12px 32px; border-radius: 4px; font-size: 16px; font-weight: 500; cursor: pointer; }
    </style>
</head>
<body>
    <div class="app-container" style="background: var(--color-bg-light);">

        <!-- 小程序系统头 -->
        <div style="position: relative; top: 0; z-index: 9999; background: #fff; padding-bottom: 4px;">
            <!-- 状态栏 -->
            <div style="height: 44px; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; font-size: 14px; font-weight: 500; font-family: -apple-system, sans-serif;">
                <span>09:41</span>
                <div style="display: flex; gap: 4px; align-items: center;">
                    <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M1 9.5L1 11M5 6.5L5 11M9 3.5L9 11M13 0.5L13 11" stroke="#111" stroke-width="1.5" stroke-linecap="round"/></svg>
                    <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 1L1 8H15L8 1Z" fill="#111"/></svg>
                    <svg width="22" height="12" viewBox="0 0 22 12" fill="none"><rect x="1" y="1" width="18" height="10" rx="3" stroke="#111" stroke-width="1.5"/><rect x="2" y="2" width="12" height="8" rx="2" fill="#111"/><path d="M21 4V8" stroke="#111" stroke-width="1.5" stroke-linecap="round"/></svg>
                </div>
            </div>
            <!-- 胶囊导航栏 -->
            <div style="height: 44px; position: relative; display: flex; align-items: center; justify-content: center;">
                <div style="position: absolute; left: 16px; font-size: 24px; cursor: pointer; color: #111; line-height: 44px;" onclick="history.back()">‹</div>
                <div style="font-size: 16px; font-weight: 600;">乐改</div>
                <div style="position: absolute; right: 12px; width: 80px; height: 32px; border-radius: 16px; border: 1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.6); display: flex; align-items: center; justify-content: space-evenly; backdrop-filter: blur(10px);">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2"><circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/></svg>
                    <div style="width: 1px; height: 16px; background: rgba(0,0,0,0.1);"></div>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/></svg>
                </div>
            </div>
        </div>

        <div class="header">
            
            <h1>确认订单</h1>
            <div style="width: 24px;"></div>
        </div>

        <div class="section store-selector">
            <div class="store-info">
                <h3>广州东风南方白云专营店 <span class="store-tag">推荐</span></h3>
                <p>广州市白云区白云大道北123号</p>
                <p style="color: #c92a2a; margin-top: 4px;">该门店支持您选购的所有项目施工</p>
            </div>
            <div style="color: #ccc; font-size: 18px;">></div>
        </div>

        <div class="section">
            <div style="font-size: 14px; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 12px;">商品清单</div>
            <div class="order-item">
                <img src="https://images.unsplash.com/photo-1555626906-fcf10d6851b4?auto=format&fit=crop&w=150&q=80" class="item-img" alt="Product">
                <div class="item-info">
                    <div class="item-title">定制改色膜 哑光黑</div>
                    <div class="item-sku">颜色: 哑光黑</div>
                    <div class="item-price-row">
                        <div class="item-price">¥3,500</div>
                        <div class="item-qty">x 1</div>
                    </div>
                </div>
            </div>
            <div class="order-item" style="margin-top: 12px; padding-top: 12px; border-top: 1px dashed #eee;">
                <div style="width: 70px; height: 70px; margin-right: 12px; display: flex; align-items: center; justify-content: center; background: #f9f9f9; font-size: 24px;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 32px; height: 32px; color: #111;"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg></div>
                <div class="item-info">
                    <div class="item-title">标准施工工时费</div>
                    <div class="item-sku">适用: 全车改色膜</div>
                    <div class="item-price-row">
                        <div class="item-price">¥800</div>
                        <div class="item-qty">x 1</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="summary-row">
                <span style="color: var(--color-text-secondary);">商品总额</span>
                <span>¥3,500</span>
            </div>
            <div class="summary-row">
                <span style="color: var(--color-text-secondary);">工时总额</span>
                <span>¥800</span>
            </div>
            <div class="summary-row">
                <span style="color: var(--color-text-secondary);">优惠券</span>
                <span style="color: #c92a2a;">- ¥100 ></span>
            </div>
            <div class="summary-row total">
                <span>实付款</span>
                <span style="color: #c92a2a;">¥4,200</span>
            </div>
        </div>

        <div class="submit-bar">
            <div>
                <span style="font-size: 12px;">实付: </span>
                <span class="submit-total">¥4,200</span>
            </div>
            <div class="submit-btn" onclick="showToast('订单已生成，跳转支付...'); location.href='order_list.html';">提交订单</div>
        </div>
    </div>
</body>
</html>
