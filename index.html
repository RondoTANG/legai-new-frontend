    <style>
        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;

        .card {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);

        .card img {
            width: 100%;
            object-fit: cover;

        .card-info {
            padding: 10px;
        }
        .card-title {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-meta {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #999;
