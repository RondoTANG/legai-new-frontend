<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的方案详情 - 乐改</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        .header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            background: transparent;
            position: fixed;
            top: 0; width: 100%; max-width: 480px; z-index: 10;
        }
        .back-btn { 
            width: 32px; height: 32px; 
            background: rgba(255,255,255,0.8); 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            text-decoration: none; color: #111; font-size: 20px;
        }

        .hero-img {
            width: 100%;
            height: 400px;
            object-fit: cover;
        }

        .content-panel {
            background: var(--color-bg);
            padding: 20px;
            border-radius: 12px 12px 0 0;
            margin-top: -16px;
            position: relative;
            z-index: 5;
        }
        
        .author-info {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
        }
        .author-avatar {
            width: 40px; height: 40px; border-radius: 50%; background: #ccc; margin-right: 12px;
        }
        .author-name { font-weight: 500; font-size: 14px; }
        .author-time { font-size: 12px; color: var(--color-text-tertiary); }
        .follow-btn { margin-left: auto; border: 1px solid #111; padding: 4px 12px; border-radius: 16px; font-size: 12px; font-weight: 500; }

        .scheme-title { font-size: 18px; font-weight: bold; margin-bottom: 12px; }
        .scheme-desc { font-size: 14px; color: var(--color-text-secondary); line-height: 1.6; margin-bottom: 24px; }

        /* Included Items */
        .included-section { margin-bottom: 80px; }
        .section-title { font-size: 16px; font-weight: bold; margin-bottom: 12px; }
        .included-item {
            display: flex;
            background: var(--color-bg-light);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            align-items: center;
        }
        .item-img { width: 60px; height: 60px; background: #ddd; border-radius: 4px; margin-right: 12px; object-fit: cover; }
        .item-detail { flex: 1; }
        .item-name { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
        .item-price { font-size: 14px; font-weight: bold; }

        /* Action bar */
        .action-bar {
            position: fixed;
            bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 480px;
            background: var(--color-bg);
            padding: 12px 20px calc(12px + env(safe-area-inset-bottom));
            display: flex;
            align-items: center;
            border-top: 1px solid var(--color-divider);
            gap: 16px;
        }
        .action-icon {
            display: flex; flex-direction: column; align-items: center;
            font-size: 10px; color: var(--color-text-secondary); cursor: pointer;
        }
        .action-icon i { font-size: 20px; margin-bottom: 2px; font-style: normal; }
        .action-btn {
            flex: 1; background: var(--color-black-btn); color: #fff;
            text-align: center; padding: 12px 0; border-radius: 4px; font-size: 16px; font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="app-container">

        <!-- 小程序系统头 -->
        <div style="position: relative; top: 0; z-index: 9999; background: #fff; padding-bottom: 4px;">
            <!-- 状态栏 -->
            <div style="height: 44px; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; font-size: 14px; font-weight: 500; font-family: -apple-system, sans-serif;">
                <span>09:41</span>
                <div style="display: flex; gap: 4px; align-items: center;">
                    <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M1 9.5L1 11M5 6.5L5 11M9 3.5L9 11M13 0.5L13 11" stroke="#111" stroke-width="1.5" stroke-linecap="round"/></svg>
                    <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 1L1 8H15L8 1Z" fill="#111"/></svg>
                    <svg width="22" height="12" viewBox="0 0 22 12" fill="none"><rect x="1" y="1" width="18" height="10" rx="3" stroke="#111" stroke-width="1.5"/><rect x="2" y="2" width="12" height="8" rx="2" fill="#111"/><path d="M21 4V8" stroke="#111" stroke-width="1.5" stroke-linecap="round"/></svg>
                </div>
            </div>
            <!-- 胶囊导航栏 -->
            <div style="height: 44px; position: relative; display: flex; align-items: center; justify-content: center;">
                <div style="position: absolute; left: 16px; font-size: 24px; cursor: pointer; color: #111; line-height: 44px;" onclick="history.back()">‹</div>
                <div style="font-size: 16px; font-weight: 600;">乐改</div>
                <div style="position: absolute; right: 12px; width: 80px; height: 32px; border-radius: 16px; border: 1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.6); display: flex; align-items: center; justify-content: space-evenly; backdrop-filter: blur(10px);">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2"><circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/></svg>
                    <div style="width: 1px; height: 16px; background: rgba(0,0,0,0.1);"></div>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/></svg>
                </div>
            </div>
        </div>

        <div class="header">
            
        </div>

        <img src="https://images.unsplash.com/photo-1549399542-7e3f8b79c341?auto=format&fit=crop&w=800&q=80" alt="Scheme Cover" class="hero-img">

        <div class="content-panel">
            <div class="author-info">
                <div class="author-avatar"></div>
                <div>
                    <div class="author-name">车友A</div>
                    <div class="author-time">2天前发布</div>
                </div>
                <div class="follow-btn">关注</div>
            </div>

            <div class="scheme-title">黑武士风格，全车哑光黑改色膜+熏黑轮毂，低调有质感</div>
            <div class="scheme-desc">
                提车一个月终于把心心念念的改色安排上了。选了哑光黑，阳光下质感无敌，搭配黑化的轮毂，真正的黑武士风格。分享给大家，有喜欢的可以直接一键引用我的方案下单。
            </div>

            <div class="included-section">
                <div class="section-title">方案包含 (2)</div>
                <div class="included-item" onclick="location.href='product_detail.html'">
                    <img src="https://images.unsplash.com/photo-1555626906-fcf10d6851b4?auto=format&fit=crop&w=150&q=80" class="item-img" alt="Product">
                    <div class="item-detail">
                        <div class="item-name">定制改色膜 哑光黑</div>
                        <div class="item-price">¥3,500</div>
                    </div>
                </div>
                <div class="included-item">
                    <img src="https://images.unsplash.com/photo-1611016186353-9af58c69a533?auto=format&fit=crop&w=150&q=80" class="item-img" alt="Product">
                    <div class="item-detail">
                        <div class="item-name">原厂轮毂黑化烤漆服务</div>
                        <div class="item-price">¥800</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <div class="action-icon">
                <i><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px; display: block; margin: 0 auto 4px;"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg></i>
                <span>128</span>
            </div>
            <div class="action-icon">
                <i><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px; display: block; margin: 0 auto 4px;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg></i>
                <span>评论</span>
            </div>
            <div class="action-btn" onclick="location.href='checkout.html'">引用该方案</div>
        </div>
    </div>
</body>
</html>
