<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>购物车 - 乐改</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        .header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            background: var(--color-bg);
            border-bottom: 1px solid var(--color-divider);
            position: sticky; top: 0; z-index: 10;
        }
        .header h1 { margin: 0; font-size: 18px; text-align: center; flex: 1; }
        .back-btn { font-size: 24px; text-decoration: none; color: #111; width: 24px; cursor: pointer; }
        .edit-btn { font-size: 14px; color: var(--color-text-secondary); cursor: pointer; }

        .cart-list { padding: 12px 16px 120px; }
        .cart-item {
            background: #fff;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }
        .checkbox {
            width: 20px; height: 20px; border-radius: 50%; border: 1px solid #ccc;
            margin-right: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .checkbox.checked { background: var(--color-black-btn); border-color: var(--color-black-btn); color: #fff; }
        .checkbox.checked::after { content: '✓'; font-size: 12px; }

        .item-img { width: 80px; height: 80px; background: #eee; border-radius: 4px; margin-right: 12px; object-fit: cover; }
        .item-info { flex: 1; }
        .item-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .item-sku { font-size: 12px; color: var(--color-text-tertiary); margin-bottom: 8px; background: #f5f5f5; display: inline-block; padding: 2px 6px; border-radius: 2px; }
        
        .item-bottom { display: flex; justify-content: space-between; align-items: center; }
        .item-price { font-size: 16px; font-weight: bold; color: var(--color-text-primary); }
        .qty-ctrl { display: flex; align-items: center; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; }
        .qty-btn { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; background: #f9f9f9; cursor: pointer; }
        .qty-input { width: 30px; height: 24px; text-align: center; border: none; border-left: 1px solid #ddd; border-right: 1px solid #ddd; font-size: 12px; }

        /* Checkout Bar */
        .checkout-bar {
            position: fixed;
            bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 480px;
            background: var(--color-bg);
            padding: 12px 20px calc(12px + env(safe-area-inset-bottom));
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid var(--color-divider);
            z-index: 20;
        }
        .select-all { display: flex; align-items: center; font-size: 14px; color: var(--color-text-secondary); cursor: pointer; }
        .total-area { display: flex; align-items: center; }
        .total-price { font-size: 18px; font-weight: bold; margin-right: 16px; }
        .checkout-btn { background: var(--color-black-btn); color: #fff; padding: 10px 24px; border-radius: 20px; font-size: 14px; font-weight: 500; cursor: pointer; }

    </style>
</head>
<body>
    <div class="app-container" style="background: var(--color-bg-light);">

        <!-- 小程序系统头 -->
        <div style="position: relative; top: 0; z-index: 9999; background: #fff; padding-bottom: 4px;">
            <!-- 状态栏 -->
            <div style="height: 44px; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; font-size: 14px; font-weight: 500; font-family: -apple-system, sans-serif;">
                <span>09:41</span>
                <div style="display: flex; gap: 4px; align-items: center;">
                    <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M1 9.5L1 11M5 6.5L5 11M9 3.5L9 11M13 0.5L13 11" stroke="#111" stroke-width="1.5" stroke-linecap="round"/></svg>
                    <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 1L1 8H15L8 1Z" fill="#111"/></svg>
                    <svg width="22" height="12" viewBox="0 0 22 12" fill="none"><rect x="1" y="1" width="18" height="10" rx="3" stroke="#111" stroke-width="1.5"/><rect x="2" y="2" width="12" height="8" rx="2" fill="#111"/><path d="M21 4V8" stroke="#111" stroke-width="1.5" stroke-linecap="round"/></svg>
                </div>
            </div>
            <!-- 胶囊导航栏 -->
            <div style="height: 44px; position: relative; display: flex; align-items: center; justify-content: center;">
                <div style="position: absolute; left: 16px; font-size: 24px; cursor: pointer; color: #111; line-height: 44px;" onclick="history.back()">‹</div>
                <div style="font-size: 16px; font-weight: 600;">乐改</div>
                <div style="position: absolute; right: 12px; width: 80px; height: 32px; border-radius: 16px; border: 1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.6); display: flex; align-items: center; justify-content: space-evenly; backdrop-filter: blur(10px);">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2"><circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/></svg>
                    <div style="width: 1px; height: 16px; background: rgba(0,0,0,0.1);"></div>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/></svg>
                </div>
            </div>
        </div>

        <div class="header">
            
            <h1>购物车</h1>
            <div class="edit-btn">管理</div>
        </div>

        <div class="cart-list">
            <div class="cart-item">
                <div class="checkbox checked"></div>
                <img src="https://images.unsplash.com/photo-1555626906-fcf10d6851b4?auto=format&fit=crop&w=150&q=80" class="item-img" alt="Product">
                <div class="item-info">
                    <div class="item-title">定制改色膜 哑光黑 (含施工)</div>
                    <div class="item-sku">颜色: 哑光黑 | 车型: 天籁</div>
                    <div class="item-bottom">
                        <div class="item-price">¥3,500</div>
                        <div class="qty-ctrl">
                            <div class="qty-btn">-</div>
                            <input type="text" class="qty-input" value="1" readonly>
                            <div class="qty-btn">+</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="cart-item">
                <div class="checkbox"></div>
                <img src="https://images.unsplash.com/photo-1611016186353-9af58c69a533?auto=format&fit=crop&w=150&q=80" class="item-img" alt="Product">
                <div class="item-info">
                    <div class="item-title">运动款碳纤维尾翼</div>
                    <div class="item-sku">款式: 运动款</div>
                    <div class="item-bottom">
                        <div class="item-price">¥1,200</div>
                        <div class="qty-ctrl">
                            <div class="qty-btn">-</div>
                            <input type="text" class="qty-input" value="1" readonly>
                            <div class="qty-btn">+</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="checkout-bar">
            <div class="select-all">
                <div class="checkbox checked" style="margin-right: 8px;"></div> 全选
            </div>
            <div class="total-area">
                <div>
                    <span style="font-size: 12px;">合计:</span>
                    <span class="total-price">¥3,500</span>
                </div>
                <div class="checkout-btn" onclick="location.href='checkout.html'">结算(1)</div>
            </div>
        </div>
    </div>
</body>
</html>
