<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的爱车库 - 乐改</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        .header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid var(--color-divider);
        }
        .header h1 { margin: 0; font-size: 18px; text-align: center; flex: 1; }
        .back-btn { font-size: 24px; text-decoration: none; color: #111; width: 24px; cursor: pointer; }
        
        .car-card {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .car-info {
            display: flex;
            align-items: flex-start;
            border-bottom: 1px solid var(--color-divider);
            padding-bottom: 16px;
            margin-bottom: 12px;
        }
        .car-logo {
            width: 48px; height: 48px; border-radius: 50%; background: #f5f5f5;
            display: flex; align-items: center; justify-content: center; margin-right: 16px; font-size: 24px;
        }
        .car-detail { flex: 1; }
        .car-name { font-size: 16px; font-weight: bold; margin-bottom: 4px; color: #111; }
        .car-plate { font-size: 13px; color: #666; background: #f0f0f0; display: inline-block; padding: 2px 8px; border-radius: 4px; margin-top: 4px; }
        
        .car-actions {
            display: flex; justify-content: space-between; align-items: center;
        }
        .default-radio {
            display: flex; align-items: center; font-size: 14px; color: #666; cursor: pointer;
        }
        .radio-icon {
            width: 16px; height: 16px; border-radius: 50%; border: 1px solid #ccc; margin-right: 8px;
            display: flex; align-items: center; justify-content: center;
        }
        .radio-icon.active {
            border-color: #111; background: #111;
        }
        .radio-icon.active::after {
            content: ''; width: 6px; height: 6px; border-radius: 50%; background: #fff;
        }
        .action-btns {
            display: flex; gap: 16px;
        }
        .action-btn {
            display: flex; align-items: center; gap: 4px; font-size: 13px; color: #666; cursor: pointer;
        }
        
        .add-btn-wrapper {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 480px; padding: 16px 20px calc(16px + env(safe-area-inset-bottom));
            background: #fff; border-top: 1px solid var(--color-divider); z-index: 20;
        }
    </style>
    <script src="js/main.js"></script>
</head>
<body style="background: var(--color-bg-light); padding-bottom: 100px;">
    <div class="app-container">
        <!-- 小程序系统头 -->
        <div style="position: relative; top: 0; z-index: 9999; background: #fff; padding-bottom: 4px;">
            <div style="height: 44px; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; font-size: 14px; font-weight: 500; font-family: -apple-system, sans-serif;">
                <span>09:41</span>
                <div style="display: flex; gap: 4px; align-items: center;">
                    <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M1 9.5L1 11M5 6.5L5 11M9 3.5L9 11M13 0.5L13 11" stroke="#111" stroke-width="1.5" stroke-linecap="round"/></svg>
                    <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 1L1 8H15L8 1Z" fill="#111"/></svg>
                    <svg width="22" height="12" viewBox="0 0 22 12" fill="none"><rect x="1" y="1" width="18" height="10" rx="3" stroke="#111" stroke-width="1.5"/><rect x="2" y="2" width="12" height="8" rx="2" fill="#111"/><path d="M21 4V8" stroke="#111" stroke-width="1.5" stroke-linecap="round"/></svg>
                </div>
            </div>
            <div style="height: 44px; position: relative; display: flex; align-items: center; justify-content: center;">
                <div style="position: absolute; left: 16px; font-size: 24px; cursor: pointer; color: #111; line-height: 44px;" onclick="history.back()">‹</div>
                <div style="font-size: 16px; font-weight: 600;">乐改</div>
                <div style="position: absolute; right: 12px; width: 80px; height: 32px; border-radius: 16px; border: 1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.6); display: flex; align-items: center; justify-content: space-evenly; backdrop-filter: blur(10px);">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2"><circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/></svg>
                    <div style="width: 1px; height: 16px; background: rgba(0,0,0,0.1);"></div>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/></svg>
                </div>
            </div>
        </div>

        <div class="header">
            
            <h1>我的爱车库</h1>
            <div style="width: 24px;"></div>
        </div>

        <div style="padding: 16px;">
            <!-- Car Card 1 -->
            <div class="car-card">
                <div class="car-info">
                    <div class="car-logo">🚘</div>
                    <div class="car-detail">
                        <div class="car-name">日产天籁 2022款 2.0T XL-TLS 悦享版</div>
                        <div class="car-plate">粤B·12345</div>
                        <div style="font-size: 12px; color: #999; margin-top: 6px;">VIN: LDFPC23483*******</div>
                    </div>
                </div>
                <div class="car-actions">
                    <div class="default-radio">
                        <div class="radio-icon active"></div> 默认爱车
                    </div>
                    <div class="action-btns">
                        <div class="action-btn" onclick="showToast('进入编辑爱车信息流程')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg> 编辑
                        </div>
                        <div class="action-btn" onclick="showToast('确定删除该爱车？')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg> 删除
                        </div>
                    </div>
                </div>
            </div>

            <!-- Car Card 2 -->
            <div class="car-card">
                <div class="car-info">
                    <div class="car-logo">🏎️</div>
                    <div class="car-detail">
                        <div class="car-name">日产轩逸 2023款 1.6L 悦享版</div>
                        <div class="car-plate">粤B·88888</div>
                    </div>
                </div>
                <div class="car-actions">
                    <div class="default-radio" onclick="showToast('已设为默认爱车')">
                        <div class="radio-icon"></div> 设为默认
                    </div>
                    <div class="action-btns">
                        <div class="action-btn" onclick="showToast('进入编辑爱车信息流程')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg> 编辑
                        </div>
                        <div class="action-btn" onclick="showToast('确定删除该爱车？')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg> 删除
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="add-btn-wrapper">
            <button class="btn btn-primary" style="width: 100%; border-radius: 24px;" onclick="showToast('打开添加爱车表单')">➕ 添加爱车</button>
        </div>
    </div>
</body>
</html>
