<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的改装方案 - 乐改</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        .header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid var(--color-divider);
        }
        .header h1 { margin: 0; font-size: 18px; text-align: center; flex: 1; }
        .back-btn { font-size: 24px; text-decoration: none; color: #111; width: 24px; cursor: pointer; }
        
        .tabs {
            display: flex;
            background: #fff;
            border-bottom: 1px solid var(--color-divider);
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 14px 0;
            font-size: 15px;
            color: #666;
            cursor: pointer;
            position: relative;
        }
        .tab.active {
            color: #111;
            font-weight: bold;
        }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0; left: 50%; transform: translateX(-50%);
            width: 32px; height: 3px; background: #111; border-radius: 2px;
        }

        .scheme-card {
            background: #fff;
            border-radius: 12px;
            margin: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .scheme-img {
            width: 100%; height: 160px; object-fit: cover;
            cursor: pointer;
        }
        .scheme-info {
            padding: 16px;
        }
        .scheme-title {
            font-size: 16px; font-weight: bold; margin-bottom: 8px; color: #111;
        }
        .scheme-meta {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 12px; color: #999; margin-bottom: 16px;
        }
        .status-tag {
            padding: 2px 8px; border-radius: 4px; font-size: 12px;
        }
        .status-published { background: #e3fcef; color: #0ca678; }
        .status-draft { background: #f1f3f5; color: #495057; }

        .scheme-actions {
            display: flex; justify-content: flex-end; gap: 12px;
            border-top: 1px solid var(--color-divider);
            padding-top: 12px;
        }
        .action-btn {
            padding: 6px 16px; border-radius: 16px; border: 1px solid #ccc;
            font-size: 13px; color: #333; cursor: pointer; background: #fff;
        }
        .action-btn-primary {
            border-color: #111; color: #111; font-weight: 500;
        }
    </style>
    <script src="js/main.js"></script>
</head>
<body style="background: var(--color-bg-light); padding-bottom: 40px;">
    <div class="app-container">
        <!-- 小程序系统头 -->
        <div style="position: relative; top: 0; z-index: 9999; background: #fff; padding-bottom: 4px;">
            <div style="height: 44px; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; font-size: 14px; font-weight: 500; font-family: -apple-system, sans-serif;">
                <span>09:41</span>
                <div style="display: flex; gap: 4px; align-items: center;">
                    <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M1 9.5L1 11M5 6.5L5 11M9 3.5L9 11M13 0.5L13 11" stroke="#111" stroke-width="1.5" stroke-linecap="round"/></svg>
                    <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 1L1 8H15L8 1Z" fill="#111"/></svg>
                    <svg width="22" height="12" viewBox="0 0 22 12" fill="none"><rect x="1" y="1" width="18" height="10" rx="3" stroke="#111" stroke-width="1.5"/><rect x="2" y="2" width="12" height="8" rx="2" fill="#111"/><path d="M21 4V8" stroke="#111" stroke-width="1.5" stroke-linecap="round"/></svg>
                </div>
            </div>
            <div style="height: 44px; position: relative; display: flex; align-items: center; justify-content: center;">
                <div style="position: absolute; left: 16px; font-size: 24px; cursor: pointer; color: #111; line-height: 44px;" onclick="history.back()">‹</div>
                <div style="font-size: 16px; font-weight: 600;">乐改</div>
                <div style="position: absolute; right: 12px; width: 80px; height: 32px; border-radius: 16px; border: 1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.6); display: flex; align-items: center; justify-content: space-evenly; backdrop-filter: blur(10px);">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2"><circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/></svg>
                    <div style="width: 1px; height: 16px; background: rgba(0,0,0,0.1);"></div>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/></svg>
                </div>
            </div>
        </div>

        <div class="header">
            <h1>我的方案</h1>
            <div style="width: 24px;"></div>
        </div>

        <!-- 搜索栏 -->
        <div style="padding: 12px 16px; display: flex; gap: 12px; background: #fff; align-items: center; border-bottom: 1px solid var(--color-divider);">
            <div style="flex: 1; background: #f4f4f5; border-radius: 4px; padding: 6px 12px; display: flex; align-items: center; gap: 8px;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21L16.65 16.65"/></svg>
                <input type="text" placeholder="搜索方案名称" style="border: none; background: transparent; outline: none; width: 100%; font-size: 14px; color: #111;">
            </div>
            <div style="font-size: 14px; color: #1890ff; cursor: pointer;">搜索</div>
            <div style="font-size: 14px; color: #666; cursor: pointer;">重置</div>
        </div>

        <!-- 车型上下文栏 (原型标准) -->
        <div style="display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #fff; border-bottom: 1px solid var(--color-divider);">
            <div style="display: flex; align-items: center; gap: 8px; overflow: hidden;">
                <span style="font-size: 14px; font-weight: bold; color: #111; white-space: nowrap;">品牌 · 车系</span>
                <span style="font-size: 12px; color: #999; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">车型名称一行显示超出...</span>
            </div>
            <div style="font-size: 14px; color: #1890ff; cursor: pointer; white-space: nowrap; margin-left: 16px;" onclick="location.href='brand_select.html'">切换</div>
        </div>

        <div class="tabs">
            <div class="tab active">自己的方案</div>
            <div class="tab">收藏的方案</div>
        </div>

        <!-- Scheme Card 1: Published -->
        <div class="scheme-card">
            <img src="https://images.unsplash.com/photo-1611016186353-9af58c69a533?auto=format&fit=crop&w=800&q=80" class="scheme-img" onclick="location.href='my_scheme_detail.html'">
            <div class="scheme-info">
                <div class="scheme-title">天籁·黑武士暗夜行者极简版</div>
                <div class="scheme-meta">
                    <span style="color: #666;">最后修改：2023-10-25 14:30</span>
                    <span style="background: #e3fcef; color: #0ca678; padding: 2px 8px; border-radius: 4px; font-size: 12px;">已发布</span>
                </div>
                <div class="scheme-actions">
                    <button class="action-btn" onclick="showToast('确定删除方案？')">删除</button>
                    <button class="action-btn" onclick="showToast('确定将此方案从社区下架？他人将无法再查看和引用。')">下架</button>
                    <button class="action-btn action-btn-primary" onclick="location.href='my_scheme_detail.html'">查看详情</button>
                </div>
            </div>
        </div>

        <!-- Scheme Card 2: Draft -->
        <div class="scheme-card">
            <img src="https://images.unsplash.com/photo-1580273916550-e323be2ae537?auto=format&fit=crop&w=800&q=80" class="scheme-img" onclick="location.href='my_scheme_detail.html'">
            <div class="scheme-info">
                <div class="scheme-title">轩逸·我的专属运动套件</div>
                <div class="scheme-meta">
                    <span style="color: #666;">最后修改：2023-10-26 09:15</span>
                    <span style="background: #f1f3f5; color: #495057; padding: 2px 8px; border-radius: 4px; font-size: 12px;">未发布</span>
                </div>
                <div class="scheme-actions">
                    <button class="action-btn" onclick="showToast('确定删除方案？')">删除</button>
                    <button class="action-btn" onclick="location.href='customization_2d.html'">编辑配置</button>
                    <button class="action-btn action-btn-primary" onclick="location.href='publish_scheme.html'">发布方案</button>
                </div>
            </div>
        </div>

        <!-- Scheme Card 3: Under Review -->
        <div class="scheme-card">
            <img src="https://images.unsplash.com/photo-1549399542-7e3f8b79c341?auto=format&fit=crop&w=800&q=80" class="scheme-img" onclick="location.href='my_scheme_detail.html'">
            <div class="scheme-info">
                <div class="scheme-title">奇骏·丛林探险越野改装版</div>
                <div class="scheme-meta">
                    <span style="color: #666;">最后修改：2023-10-27 10:00</span>
                    <span style="background: #e6f7ff; color: #1890ff; padding: 2px 8px; border-radius: 4px; font-size: 12px;">审核中</span>
                </div>
                <div class="scheme-actions">
                    <button class="action-btn" onclick="showToast('正在审核中，无法编辑或发布')">催审</button>
                    <button class="action-btn action-btn-primary" onclick="location.href='my_scheme_detail.html'">查看进度</button>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
