<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>商品详情 - 乐改</title>
    <link rel="stylesheet" href="css/global.css">
    <script src="js/main.js"></script>
    <style>
        .header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            background: transparent;
            position: fixed;
            top: 0;
            width: 100%;
            max-width: 480px;
            z-index: 10;
        }
        .header h1 { margin: 0; font-size: 16px; text-align: center; flex: 1; opacity: 0; }
        .back-btn { 
            width: 32px; height: 32px; 
            background: rgba(255,255,255,0.8); 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            text-decoration: none; color: #111; font-size: 20px;
        }

        .product-img-wrapper {
            width: 100%;
            height: 400px;
            background-color: #f2f2f2; /* Light gray background like Xiaomi AC screenshot */
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .product-img-wrapper img {
            width: 80%;
            object-fit: contain;
        }

        .product-info-panel {
            background: var(--color-bg);
            padding: 20px;
            margin-top: -10px;
            border-radius: 12px 12px 0 0;
            position: relative;
        }
        .price-row {
            display: flex;
            align-items: baseline;
            margin-bottom: 12px;
        }
        .price-symbol { font-size: 16px; font-weight: 500; }
        .price-amount { font-size: 28px; font-weight: 500; margin-right: 8px; }
        .price-old { font-size: 14px; color: var(--color-text-tertiary); text-decoration: line-through; }
        
        .tags { display: flex; gap: 8px; margin-bottom: 12px; }
        .tag { border: 1px solid #111; color: #111; font-size: 10px; padding: 2px 6px; border-radius: 2px; }

        .title { font-size: 18px; font-weight: 600; line-height: 1.4; margin-bottom: 8px; }
        .desc { font-size: 13px; color: var(--color-text-secondary); line-height: 1.5; margin-bottom: 20px; }

        .section-cell {
            padding: 16px 20px;
            background: var(--color-bg);
            margin-top: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .section-label { color: var(--color-text-secondary); font-size: 14px; width: 60px; }
        .section-value { flex: 1; font-size: 14px; font-weight: 500; }

        /* Bottom Action Bar */
        .action-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: var(--color-bg);
            padding: 12px 20px calc(12px + env(safe-area-inset-bottom));
            display: flex;
            align-items: center;
            border-top: 1px solid var(--color-divider);
            gap: 16px;
        }
        .action-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            color: var(--color-text-secondary);
            cursor: pointer;
        }
        .action-icon i { font-size: 20px; margin-bottom: 2px; font-style: normal; }
        
        .buy-btn {
            flex: 1;
            background: var(--color-black-btn);
            color: #fff;
            text-align: center;
            padding: 14px 0;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }

    </style>
</head>
<body>
    <div class="app-container" style="background: var(--color-bg-light);">

        <!-- 小程序系统头 -->
        <div style="position: relative; top: 0; z-index: 9999; background: #fff; padding-bottom: 4px;">
            <!-- 状态栏 -->
            <div style="height: 44px; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; font-size: 14px; font-weight: 500; font-family: -apple-system, sans-serif;">
                <span>09:41</span>
                <div style="display: flex; gap: 4px; align-items: center;">
                    <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M1 9.5L1 11M5 6.5L5 11M9 3.5L9 11M13 0.5L13 11" stroke="#111" stroke-width="1.5" stroke-linecap="round"/></svg>
                    <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 1L1 8H15L8 1Z" fill="#111"/></svg>
                    <svg width="22" height="12" viewBox="0 0 22 12" fill="none"><rect x="1" y="1" width="18" height="10" rx="3" stroke="#111" stroke-width="1.5"/><rect x="2" y="2" width="12" height="8" rx="2" fill="#111"/><path d="M21 4V8" stroke="#111" stroke-width="1.5" stroke-linecap="round"/></svg>
                </div>
            </div>
            <!-- 胶囊导航栏 -->
            <div style="height: 44px; position: relative; display: flex; align-items: center; justify-content: center;">
                <div style="position: absolute; left: 16px; font-size: 24px; cursor: pointer; color: #111; line-height: 44px;" onclick="history.back()">‹</div>
                <div style="font-size: 16px; font-weight: 600;">乐改</div>
                <div style="position: absolute; right: 12px; width: 80px; height: 32px; border-radius: 16px; border: 1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.6); display: flex; align-items: center; justify-content: space-evenly; backdrop-filter: blur(10px);">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2"><circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/></svg>
                    <div style="width: 1px; height: 16px; background: rgba(0,0,0,0.1);"></div>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/></svg>
                </div>
            </div>
        </div>

        <div class="header">
            
        </div>

        <div class="product-img-wrapper">
            <img src="https://images.unsplash.com/photo-1601362840469-51e4d8d58785?auto=format&fit=crop&w=800&q=80" alt="Product">
        </div>

        <div class="product-info-panel">
            <div class="price-row">
                <span class="price-symbol">¥</span>
                <span class="price-amount">2199</span>
                <span class="price-old">¥2399</span>
            </div>
            <div class="tags">
                <span class="tag">含工时费</span>
                <span class="tag">原厂质保</span>
            </div>
            <h1 class="title">TPU材质 隐形车衣 亮面透明保护膜 专车定制裁膜</h1>
            <div class="desc">强效防刮蹭，持久耐黄变。包施工，覆盖全车漆面。</div>
        </div>

        <div class="section-cell" onclick="location.href='customization_2d.html'">
            <div class="section-label">选择</div>
            <div class="section-value">已选: 标准套餐, 1件</div>
            <div style="color: #ccc;">></div>
        </div>
        
        <div class="section-cell">
            <div class="section-label">门店</div>
            <div class="section-value">适用的核销专营店 (12家)</div>
            <div style="color: #ccc;">></div>
        </div>

        <div style="padding: 20px; text-align: center; color: #999; font-size: 12px; margin-top: 20px;">
            -- 图文详情 --
        </div>
        <div style="height: 300px; background: #fff; margin: 0 20px 100px;"></div>

        <div class="action-bar">
            <div class="action-icon">
                <i>⭐</i>
                <span>收藏</span>
            </div>
            <div class="buy-btn" style="background:#fff; color:#111; border:1px solid #111;" onclick="addToScheme('隐形车衣套餐', '8999')">加入改装方案</div>
            <div class="buy-btn" onclick="location.href='checkout.html'">直接领券购买</div>
        </div>
    </div>
</body>
</html>
