<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>选择品牌 - 乐改</title>
    <link rel="stylesheet" href="css/global.css">
    <script src="js/main.js"></script>
    <style>
        .header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            background: var(--color-bg);
            border-bottom: 1px solid var(--color-divider);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header h1 { margin: 0; font-size: 18px; text-align: center; flex: 1; }
        .back-btn { font-size: 24px; text-decoration: none; color: #111; width: 24px; cursor: pointer; }

        .search-bar {
            padding: 12px 20px;
            background: var(--color-bg);
        }
        .search-input {
            width: 100%;
            background: #f5f5f5;
            border: none;
            padding: 10px 16px;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
        }

        .brand-list {
            padding-bottom: 40px;
        }
        .alpha-header {
            background: var(--color-bg-light);
            padding: 4px 20px;
            font-size: 12px;
            font-weight: bold;
            color: var(--color-text-tertiary);
        }
        .brand-item {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: var(--color-bg);
            border-bottom: 1px solid var(--color-divider);
            cursor: pointer;
        }
        .brand-logo {
            width: 40px;
            height: 40px;
            background: #eee;
            border-radius: 50%;
            margin-right: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #999;
        }
        .brand-name {
            font-size: 16px;
            font-weight: 500;
        }
        
        .alpha-index {
            position: fixed;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            font-size: 10px;
            color: var(--color-text-secondary);
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="app-container">

        <!-- 小程序系统头 -->
        <div style="position: relative; top: 0; z-index: 9999; background: #fff; padding-bottom: 4px;">
            <!-- 状态栏 -->
            <div style="height: 44px; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; font-size: 14px; font-weight: 500; font-family: -apple-system, sans-serif;">
                <span>09:41</span>
                <div style="display: flex; gap: 4px; align-items: center;">
                    <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M1 9.5L1 11M5 6.5L5 11M9 3.5L9 11M13 0.5L13 11" stroke="#111" stroke-width="1.5" stroke-linecap="round"/></svg>
                    <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 1L1 8H15L8 1Z" fill="#111"/></svg>
                    <svg width="22" height="12" viewBox="0 0 22 12" fill="none"><rect x="1" y="1" width="18" height="10" rx="3" stroke="#111" stroke-width="1.5"/><rect x="2" y="2" width="12" height="8" rx="2" fill="#111"/><path d="M21 4V8" stroke="#111" stroke-width="1.5" stroke-linecap="round"/></svg>
                </div>
            </div>
            <!-- 胶囊导航栏 -->
            <div style="height: 44px; position: relative; display: flex; align-items: center; justify-content: center;">
                <div style="position: absolute; left: 16px; font-size: 24px; cursor: pointer; color: #111; line-height: 44px;" onclick="history.back()">‹</div>
                <div style="font-size: 16px; font-weight: 600;">乐改</div>
                <div style="position: absolute; right: 12px; width: 80px; height: 32px; border-radius: 16px; border: 1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.6); display: flex; align-items: center; justify-content: space-evenly; backdrop-filter: blur(10px);">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2"><circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/></svg>
                    <div style="width: 1px; height: 16px; background: rgba(0,0,0,0.1);"></div>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/></svg>
                </div>
            </div>
        </div>

        <div class="header">
            
            <h1>选择爱车品牌</h1>
            <div style="width: 24px;"></div>
        </div>

        <div class="search-bar">
            <input type="text" class="search-input" placeholder="搜索品牌，例如：日产 / 宝马">
        </div>

        <div class="brand-list">
            <div class="alpha-header">热</div>
            <div class="brand-item" onclick="openDrawer('东风日产')">
                <div class="brand-logo">N</div>
                <div class="brand-name">东风日产 (点我选车测试)</div>
            </div>
            <div class="brand-item" onclick="openDrawer('宝马')">
                <div class="brand-logo">B</div>
                <div class="brand-name">宝马</div>
            </div>
            
            <div class="alpha-header">A</div>
            <div class="brand-item" onclick="openDrawer('奥迪')">
                <div class="brand-logo">A</div>
                <div class="brand-name">奥迪</div>
            </div>
            <div class="brand-item" onclick="openDrawer('阿斯顿·马丁')">
                <div class="brand-logo">A</div>
                <div class="brand-name">阿斯顿·马丁</div>
            </div>

            <div class="alpha-header">B</div>
            <div class="brand-item" onclick="openDrawer('保时捷')">
                <div class="brand-logo">B</div>
                <div class="brand-name">保时捷</div>
            </div>
            <div class="brand-item" onclick="openDrawer('比亚迪')">
                <div class="brand-logo">B</div>
                <div class="brand-name">比亚迪</div>
            </div>
            <div class="brand-item" onclick="openDrawer('本田')">
                <div class="brand-logo">B</div>
                <div class="brand-name">本田</div>
            </div>
        </div>

        <div class="alpha-index">
            <span>热</span><span>A</span><span>B</span><span>C</span><span>D</span><span>E</span><span>F</span>
            <span>G</span><span>H</span><span>I</span><span>J</span><span>K</span><span>L</span><span>M</span>
            <span>N</span><span>O</span><span>P</span><span>Q</span><span>R</span><span>S</span><span>T</span>
        </div>

        <!-- Drawer Overlay -->
        <div id="drawer-overlay" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 9999;" onclick="closeDrawer()"></div>
        
        <!-- Drawer Content -->
        <div id="model-drawer" style="position: fixed; top: 0; right: -100%; width: 85%; max-width: 400px; height: 100%; background: #fff; z-index: 10000; transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: -4px 0 16px rgba(0,0,0,0.1); display: flex; flex-direction: column;">
            <div style="padding: 16px 20px; font-weight: bold; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; padding-top: calc(16px + env(safe-area-inset-top));">
                <span id="drawer-brand-title">选择车系与车型</span>
                <span onclick="closeDrawer()" style="font-size: 24px; color: #999; cursor: pointer; padding: 0 8px;">×</span>
            </div>
            <div style="flex: 1; overflow-y: auto;">
                <div class="series-group">
                    <div style="padding: 12px 20px; background: #f9f9f9; font-size: 14px; font-weight: bold; color: #333;">天籁 ALTIMA</div>
                    <div style="padding: 0 20px;">
                        <div style="padding: 16px 0; border-bottom: 1px solid #eee; font-size: 14px; cursor: pointer;" onclick="saveCar('东风日产', '天籁 2022款 2.0L XL-TLS悦享版')">2022款 2.0L XL-TLS 悦享版</div>
                        <div style="padding: 16px 0; border-bottom: 1px solid #eee; font-size: 14px; cursor: pointer;" onclick="saveCar('东风日产', '天籁 2022款 2.0T XV 尊享版')">2022款 2.0T XV 尊享版</div>
                        <div style="padding: 16px 0; border-bottom: 1px solid #eee; font-size: 14px; cursor: pointer;" onclick="saveCar('东风日产', '天籁 2021款 2.0L XE 纯真版')">2021款 2.0L XE 纯真版</div>
                    </div>
                </div>
                <div class="series-group">
                    <div style="padding: 12px 20px; background: #f9f9f9; font-size: 14px; font-weight: bold; color: #333;">轩逸 SYLPHY</div>
                    <div style="padding: 0 20px;">
                        <div style="padding: 16px 0; border-bottom: 1px solid #eee; font-size: 14px; cursor: pointer;" onclick="saveCar('东风日产', '轩逸 2023款 1.6L 悦享版')">2023款 1.6L 悦享版</div>
                        <div style="padding: 16px 0; border-bottom: 1px solid #eee; font-size: 14px; cursor: pointer;" onclick="saveCar('东风日产', '轩逸 2022款 e-POWER 超智联PLUS')">2022款 e-POWER 超智联PLUS</div>
                    </div>
                </div>
                <div class="series-group">
                    <div style="padding: 12px 20px; background: #f9f9f9; font-size: 14px; font-weight: bold; color: #333;">逍客 QASHQAI</div>
                    <div style="padding: 0 20px;">
                        <div style="padding: 16px 0; border-bottom: 1px solid #eee; font-size: 14px; cursor: pointer;" onclick="saveCar('东风日产', '逍客 2023款 2.0L 豪华版')">2023款 2.0L 豪华版</div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            function openDrawer(brandName) {
                document.getElementById('drawer-brand-title').innerText = brandName;
                document.getElementById('drawer-overlay').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('model-drawer').style.right = '0';
                }, 10);
            }
            function closeDrawer() {
                document.getElementById('model-drawer').style.right = '-100%';
                setTimeout(() => {
                    document.getElementById('drawer-overlay').style.display = 'none';
                }, 300);
            }
        </script>
    </div>
</body>
</html>
